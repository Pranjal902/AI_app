
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoxVeritas | Premium Audio Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,600;0,800;1,800&display=swap" rel="stylesheet">
    <style>
      body {
        margin: 0;
        background-color: #050505;
        color: #f8f8f8;
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      
      h1, h2, h3, .heading-font {
        font-family: 'Plus Jakarta Sans', sans-serif;
      }

      .premium-glass {
        background: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(30px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .halo-shadow {
        box-shadow: 0 0 80px -20px rgba(255, 255, 255, 0.08);
      }

      .btn-premium {
        background: #f8f8f8;
        color: #050505;
        transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      }

      .btn-premium:hover {
        background: #ffffff;
        transform: translateY(-2px);
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      }

      .btn-premium:active {
        transform: translateY(0px) scale(0.98);
      }

      @keyframes fluid-pulse {
        0%, 100% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
        34% { border-radius: 70% 30% 50% 50% / 30% 60% 40% 70%; }
        67% { border-radius: 100% 60% 60% 100% / 100% 100% 60% 60%; }
      }

      .liquid-morph {
        animation: fluid-pulse 10s ease-in-out infinite;
      }

      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: #050505; }
      ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",

        "react": "https://esm.sh/react@^19.2.4",
        "@google/genai": "https://esm.sh/@google/genai@^1.39.0"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>

</body>
</html>
